<html>
<head>
    <title>Speech Coach</title>
</head>
<body>

    <h1>Upload Audio</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label>What is this speech for?</label><br>
        <input type="text" name="context" placeholder="e.g. job interview, class presentation, etc." style="width:100%;margin-bottom: 10px;"><br>

        <label>Upload your audio file:</label><br>
        <input type="file" name="audio" accept="audio/*" required><br><br>

        <button type="submit">Upload</button>
    </form>

</body>
</html>
